services:
  hermes-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hermes
    volumes:
      - hermes_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [hermes-net]

  hermes-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [hermes-net]

  hermes-bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on: [hermes-postgres, hermes-redis]
    networks: [hermes-net]

volumes:
  hermes_pgdata:

networks:
  hermes-net: