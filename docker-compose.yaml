services:
  hermes-postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hermes
    volumes:
      - hermes_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [hermes-net]

  hermes-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [hermes-net]

  hermes-bot:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "3010:3010"
    depends_on: [hermes-postgres, hermes-redis]
    networks: [hermes-net]

  gworkspace-mcp:
    profiles: ["mcp"]
    image: ghcr.io/taylorwilsdon/google_workspace_mcp:latest
    restart: unless-stopped
    env_file: .env
    command: ["--transport", "streamable-http", "--port", "8000"]
    networks: [hermes-net]

  hubspot-mcp:
    profiles: ["mcp"]
    image: node:20-alpine
    restart: unless-stopped
    command: sh -c "npx -y @hubspot/mcp-server --http --port 8001"
    environment:
      PRIVATE_APP_ACCESS_TOKEN: ${HUBSPOT_TOKEN}
    networks: [hermes-net]

volumes:
  hermes_pgdata:

networks:
  hermes-net:
